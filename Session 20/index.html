<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review 01</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Phần thêm mới công việc -->
        <div>
            <div class="input-container">
                <label for="">Tên công việc:</label>
                <input type="text" id="todoInput">
            </div>

            <div class="input-container">
                <label for="">Hạn công việc:</label>
                <input type="date" name="" id="todoDate">
            </div>

            <div class="input-container">
                <label for="">Trạng thái công việc</label>
                <select name="" id="todoStatus">
                    <option value="">Chọn trạng thái</option>
                    <option value="to do">to do</option>
                    <option value="pending">pending</option>
                </select>
            </div>

            <button onclick="addOrEditTodo()" id="todoBtn">Thêm công việc</button>
        </div><br>

        <!-- Phần tìm kiếm và lọc -->
        <div class="input-container">
            <input type="text" placeholder="Tìm kiếm công việc" id="findInput" oninput="findTodoByName()">
            <!-- <button onclick="findTodoByName()">Tìm kiếm</button> -->
            <select name="" id="filterInput" onchange="filterTodoByStatus()">
                <option value="">Lọc theo trạng thái</option>
                <option value="to do">to do</option>
                <option value="pending">pending</option>
            </select>
        </div>

        <!-- Phần hiển thị công việc -->
        <h3>Danh sách công việc</h3>
        <ul id="todoList">
        </ul>

        <script src="./script.js"></script>
    </div>
</body>

</html>
