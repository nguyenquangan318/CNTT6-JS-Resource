<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let date = new Date();
        let bookName = prompt(" nhập Tên Sách ").trim().toUpperCase();
        let author = prompt(" tên Tác Giả ").toLowerCase();
        let year = prompt(" năm xuất Bản ");
        let price = +prompt(" Giá Tiền  ");
        let quantity = +prompt(" Số Lượng ");
        let firstName = author.substring(0, 3);
        let number = Math.floor(Math.random() * 1000) + 1;
        let bookID = `${firstName}${year} - ${number}`;
        const bookAge = date.getFullYear() - year;
        let sum = price * quantity;
        console.log(`-----Phiếu nhập sách
        Mã sách: ${bookID}
        Tên sách: ${bookName}
        Tác giả: ${author}
        Năm xuất bản: ${year}
        Tuổi sách: ${bookAge}
        Tổng giá trị: ${sum}
        Ngăn kệ gợi ý: ${Math.floor(Math.random() * 10) + 1}`);
    </script>
</body>

</html>
